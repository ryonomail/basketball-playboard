<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark -->
  <rect width="1024" height="1024" rx="224" fill="#1a1a1a"/>

  <!-- Court surface: white -->
  <rect x="112" y="180" width="800" height="664" rx="8" fill="#ffffff" opacity="0.95"/>

  <!-- Court lines: black -->
  <g stroke="#1a1a1a" stroke-width="6" fill="none">
    <!-- Outline -->
    <rect x="112" y="180" width="800" height="664" rx="8"/>
    <!-- Center line -->
    <line x1="512" y1="180" x2="512" y2="844"/>
    <!-- Center circle -->
    <circle cx="512" cy="512" r="80"/>

    <!-- Left half court -->
    <!-- Paint area -->
    <rect x="112" y="380" width="180" height="264"/>
    <!-- Free throw circle -->
    <circle cx="292" cy="512" r="80"/>
    <!-- Basket -->
    <circle cx="152" cy="512" r="12"/>
    <!-- Backboard -->
    <line x1="136" y1="480" x2="136" y2="544"/>
    <!-- 3-point arc -->
    <path d="M 112 300 C 380 300 380 724 112 724"/>
    <!-- Restricted area arc -->
    <path d="M 130 480 C 192 460 192 564 130 544"/>

    <!-- Right half court -->
    <!-- Paint area -->
    <rect x="732" y="380" width="180" height="264"/>
    <!-- Free throw circle -->
    <circle cx="732" cy="512" r="80"/>
    <!-- Basket -->
    <circle cx="872" cy="512" r="12"/>
    <!-- Backboard -->
    <line x1="888" y1="480" x2="888" y2="544"/>
    <!-- 3-point arc -->
    <path d="M 912 300 C 644 300 644 724 912 724"/>
    <!-- Restricted area arc -->
    <path d="M 894 480 C 832 460 832 564 894 544"/>
  </g>
</svg>
